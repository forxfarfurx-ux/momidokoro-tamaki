<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#efe2c8" />
  <title>揉み処たまき</title>
  <meta name="description" content="みーちゃん専用、当日予約だけの足揉み処です。" />
  <link rel="preload" href="./assets/tamaki-massage.webp" as="image" type="image/webp" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app-shell">
    <article class="app-card">
      <header class="hero">
        <img
          class="hero-image"
          src="./assets/tamaki-massage.webp"
          alt="着物姿のたまき店長が、足の指を丁寧に揉んでいる様子"
          width="1200"
          height="680"
        />
        <div class="hero-shade" aria-hidden="true"></div>
        <div class="hero-title">
          <p class="eyebrow">みーちゃん専用・当日予約のみ</p>
          <h1>揉み処 <span>たまき</span></h1>
          <p>今日の疲れは、今日のうちに。</p>
        </div>
        <span class="open-pill">本日受付中</span>
      </header>

      <form id="bookingForm" class="booking" novalidate>
        <section class="booking-section" aria-labelledby="timeTitle">
          <div class="section-heading">
            <h2 id="timeTitle"><span aria-hidden="true">◷</span> ご希望の時間</h2>
            <small>当日予約のみ</small>
          </div>
          <div class="time-grid choice-group" data-name="timeWindow">
            <button type="button" data-value="空いた時" aria-pressed="false">
              <span class="choice-icon" aria-hidden="true">☀</span>
              <strong>空いた時</strong>
              <small>手が空きしだい</small>
            </button>
            <button type="button" data-value="今夜" aria-pressed="false">
              <span class="choice-icon" aria-hidden="true">☾</span>
              <strong>今夜</strong>
              <small>夕方〜夜</small>
            </button>
            <button type="button" data-value="寝る前" aria-pressed="false">
              <span class="choice-icon" aria-hidden="true">☽</span>
              <strong>寝る前</strong>
              <small>眠る前に</small>
            </button>
          </div>
        </section>

        <section class="booking-section" aria-labelledby="courseTitle">
          <div class="section-heading">
            <h2 id="courseTitle"><span aria-hidden="true">🐾</span> おすすめコース</h2>
            <small>たまき人民元</small>
          </div>
          <div class="course-grid choice-group" data-name="course">
            <button type="button" class="course-card" data-value="100たま・たまきのおためし 10分" aria-pressed="false">
              <img src="./assets/course-1.webp" alt="たまきが足を揉んでいるおためしコース" width="190" height="135" />
              <span class="course-text">
                <strong>たまきの<br>おためし</strong>
                <small>100たま・10分</small>
              </span>
            </button>
            <button type="button" class="course-card selected recommended" data-value="300たま・足つぼじっくり 20分" aria-pressed="true">
              <span class="ribbon">おすすめ</span>
              <img src="./assets/course-2.webp" alt="たまきが一生懸命足の指を揉んでいるコース" width="191" height="135" />
              <span class="course-text">
                <strong>足つぼ<br>じっくり</strong>
                <small>300たま・20分</small>
              </span>
            </button>
            <button type="button" class="course-card" data-value="500たま・ふくらはぎ集中 30分" aria-pressed="false">
              <img src="./assets/course-3.webp" alt="たまきが集中して足を揉んでいるコース" width="192" height="135" />
              <span class="course-text">
                <strong>ふくらはぎ<br>集中</strong>
                <small>500たま・30分</small>
              </span>
            </button>
            <button type="button" class="course-card" data-value="500たま・極上リラックス 30分" aria-pressed="false">
              <img src="./assets/course-4.webp" alt="たまきが気持ちよさそうに眠る極上リラックスコース" width="186" height="135" />
              <span class="course-text">
                <strong>極上<br>リラックス</strong>
                <small>500たま・30分</small>
              </span>
            </button>
          </div>
        </section>

        <section class="voice-card" aria-labelledby="voiceTitle">
          <img src="./assets/tamaki-sleep.webp" alt="眠っているたまき店長" width="300" height="300" />
          <div>
            <h2 id="voiceTitle">お客様の声</h2>
            <blockquote>「たまきの手は、ふわふわであたたかくて……気づいたら、夢うつつでした。」</blockquote>
            <p>みーちゃん・常連</p>
          </div>
        </section>

        <details class="note-details">
          <summary>ひとこと追加する <span>任意</span></summary>
          <label for="note" class="sr-only">備考</label>
          <input id="note" maxlength="100" placeholder="例：右足の指を重点的にお願いします" />
        </details>

        <div class="submit-area">
          <p id="selectionSummary" class="selection-summary">時間を選んでください</p>
          <button id="submitButton" class="submit-button" type="submit">
            <span aria-hidden="true">🐾</span> たまきに依頼する
          </button>
          <p id="message" class="message" role="status" aria-live="polite"></p>
        </div>
      </form>
    </article>
  </main>
  <script src="./app.js"></script>
</body>
</html>
